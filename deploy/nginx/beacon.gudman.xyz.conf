# Beacon landing + Autopilot static site
# Domain: beacon.gudman.xyz
# Source: /opt/beacon/app/dist/ (built via `npm run build` in app/)

server {
    listen 80;
    listen [::]:80;
    server_name beacon.gudman.xyz;

    include /etc/nginx/snippets/acme-challenge.conf;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name beacon.gudman.xyz;

    ssl_certificate /etc/letsencrypt/live/beacon.gudman.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beacon.gudman.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /opt/beacon/app/dist;
    index index.html;

    # Long cache for hashed assets
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Short cache for HTML
    location / {
        add_header Cache-Control "public, max-age=60";
        try_files $uri $uri/ /index.html;
    }
}
