# safe-yield (composite)
server {
    listen 80; listen [::]:80;
    server_name safe-yield.gudman.xyz;
    include /etc/nginx/snippets/acme-challenge.conf;
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name safe-yield.gudman.xyz;

    ssl_certificate /etc/letsencrypt/live/safe-yield.gudman.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safe-yield.gudman.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CORS for Autopilot UI
    add_header Access-Control-Allow-Origin "https://beacon.gudman.xyz" always;
    add_header Access-Control-Allow-Headers "X-Payment, Content-Type" always;
    add_header Access-Control-Expose-Headers "X-Payment-Response" always;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://beacon.gudman.xyz";
            add_header Access-Control-Allow-Headers "X-Payment, Content-Type";
            add_header Access-Control-Expose-Headers "X-Payment-Response";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Payment $http_x_payment;
        proxy_pass_header X-Payment-Response;
        # Composite cascade may take a few seconds under load
        proxy_read_timeout 120s;
    }
}

# beacon-mcp (SSE)
server {
    listen 80; listen [::]:80;
    server_name mcp.gudman.xyz;
    include /etc/nginx/snippets/acme-challenge.conf;
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name mcp.gudman.xyz;

    ssl_certificate /etc/letsencrypt/live/mcp.gudman.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.gudman.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # SSE requires no buffering + long timeouts
    location / {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
