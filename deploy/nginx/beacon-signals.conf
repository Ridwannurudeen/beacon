# Signal subdomain reverse proxies — all share this template.
# Domains: wallet-risk / liquidity-depth / yield-score / safe-yield / mcp.gudman.xyz

# wallet-risk
server {
    listen 80; listen [::]:80;
    server_name wallet-risk.gudman.xyz;
    include /etc/nginx/snippets/acme-challenge.conf;
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name wallet-risk.gudman.xyz;

    ssl_certificate /etc/letsencrypt/live/wallet-risk.gudman.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wallet-risk.gudman.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve x402 payment headers end-to-end
        proxy_set_header X-Payment $http_x_payment;
        proxy_pass_header X-Payment-Response;
        proxy_read_timeout 60s;
    }
}

