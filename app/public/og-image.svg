<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="20%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="brand-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#07070d"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- brand -->
  <g transform="translate(80, 80)">
    <rect width="48" height="48" rx="14" fill="url(#brand-mark)"/>
    <rect x="9" y="9" width="30" height="30" rx="7" fill="#07070d"/>
    <rect x="20" y="20" width="8" height="8" rx="2" fill="url(#brand-mark)"/>
    <text x="68" y="32" font-family="JetBrains Mono, monospace" font-weight="700" font-size="20" letter-spacing="3.2" fill="#f5f6fa">BEACON</text>
    <text x="195" y="32" font-family="JetBrains Mono, monospace" font-weight="500" font-size="16" letter-spacing="2.5" fill="#6f7184">/ ATLAS V2</text>
  </g>

  <!-- headline -->
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="68" fill="#f5f6fa" letter-spacing="-2">The strategy vault where</text>
  <text x="80" y="350" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="68" fill="url(#grad-text)" letter-spacing="-2">intelligence has a price.</text>

  <!-- sub -->
  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="24" fill="#b7b9c5">EIP-712 signed cascade receipts · vault custody · X Layer testnet</text>

  <!-- footer chips -->
  <g transform="translate(80, 510)" font-family="JetBrains Mono, monospace" font-size="14" fill="#b7b9c5">
    <rect x="0" y="0" width="240" height="40" rx="20" fill="#11111e" stroke="#181826"/>
    <circle cx="20" cy="20" r="4" fill="#10b981"/>
    <text x="36" y="25">42/42 contracts tested</text>

    <rect x="260" y="0" width="240" height="40" rx="20" fill="#11111e" stroke="#181826"/>
    <circle cx="280" cy="20" r="4" fill="#a78bfa"/>
    <text x="296" y="25">vault-controlled custody</text>

    <rect x="520" y="0" width="280" height="40" rx="20" fill="#11111e" stroke="#181826"/>
    <circle cx="540" cy="20" r="4" fill="#60a5fa"/>
    <text x="556" y="25">on-chain CascadeLedger</text>
  </g>

  <text x="1120" y="600" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#4a4c5a">beacon.gudman.xyz</text>
</svg>
